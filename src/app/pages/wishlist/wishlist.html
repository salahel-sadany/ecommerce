@let vm = store.vm();

<section class="py-22">
  <div class="wrapper">
    <app-back-button label="Continue Shopping" navigateTo="/products/all" />

    @if (vm.wishlistItemsCount > 0) {
      <div class="flex flex-col sm:flex-row sm:justify-between sm:items-baseline mb-6 gap-2">
        <h1 class="text-2xl md:text-3xl font-bold">My Wishlist</h1>
        <span class="mat-text-on-secondary-container text-lg md:text-xl">
          {{ vm.wishlistItemsCount }} Items
        </span>
      </div>

      <div class="grid grid-auto-fill">
        @for (product of vm.wishlistItems; track product.id) {
          <app-product-card [product]="product">
            <mat-icon ngProjectAs="toggle-wishlist-icon">delete</mat-icon>
          </app-product-card>
        }
      </div>

      <div class="mt-10 flex justify-center">
        <button
          matButton="outlined"
          color="warn"
          class="w-full danger sm:w-auto min-w-50 px-4!"
          (click)="store.clearWishlist()"
        >
          <mat-icon>delete_sweep</mat-icon>
          <span> Clear Wishlist</span>
        </button>
      </div>
    } @else {
      <app-empty-wishlist />
    }
  </div>
</section>
