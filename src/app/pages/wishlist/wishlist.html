@let vm = store.vm();

<section class="pt-22">
  <div class="wrapper">
    <app-back-button
      class="justify-self-start"
      label="Continue Shopping"
      navigateTo="/products/all"
    />

    @if (vm.wishlistItemsCount > 0) {
      <div class="flex justify-between">
        <h1 class="text-2xl font-bold mb-4">My Wishlist</h1>
        <span class="mat-text-on-secondary-container text-xl"
          >{{ vm.wishlistItemsCount }} Items</span
        >
      </div>

      <div class="grid-auto-fill">
        @for (product of vm.wishlistItems; track product.id) {
          <app-product-card [product]="product">
            <mat-icon ngProjectAs="toggle-wishlist-icon">delete</mat-icon>
          </app-product-card>
        }
      </div>

      <button
        matButton="outlined"
        class="danger block! mx-auto mt-6"
        (click)="store.clearWishlist()"
      >
        Clear Wishlist
      </button>
    } @else {
      <app-empty-wishlist />
    }
  </div>
</section>
