@let vm = store.vm();

<section class="pt-22">
  <div class="wrapper">
    <app-back-button label="Continue Shopping" navigateTo="/products/all" />

    <h1 class="text-3xl font-extrabold mb-4">Shopping Cart</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-3">
        <app-tease-wishlist [count]="vm.wishlistItemsCount" />
      </div>

      <div class="lg:col-span-2">
        <app-cart-items-list />
      </div>

      <div>
        <app-order-summary>
          <button
            class="w-full mt-6 p-3"
            ngProjectAs="actionButton"
            matButton="filled"
            (click)="store.proceedToCheckout()"
          >
            Proceed to Checkout
          </button>
        </app-order-summary>
      </div>
    </div>
  </div>
</section>
