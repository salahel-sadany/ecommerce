@let vm = store.vm();

<section class="pt-22">
  <div class="wrapper">
    <app-back-button
      class="justify-self-start"
      label="Continue Shopping"
      navigateTo="/products/all"
    />

    <h1 class="text-3xl font-extrabold mb-4">Shopping Cart</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-3">
        <app-tease-wishlist [count]="vm.wishlistItemsCount" />
      </div>

      <div class="lg:col-span-2">
        <app-cart-items-list />
      </div>

      <div>
        <app-order-summary />
      </div>
    </div>
  </div>
</section>
