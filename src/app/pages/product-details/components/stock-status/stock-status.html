@if (inStock()) {
  <p class="flex items-center gap-2 mat-border-subtle rounded-lg px-3 py-3 mat-bg-surface">
    <mat-icon class="small">check_circle</mat-icon>
    <span class="text-sm mat-text-on-secondary-container">In stock and ready to ship</span>
  </p>
} @else {
  <div
    class="flex items-center gap-3 mat-border-subtle rounded-lg px-3 py-3 mat-bg-error-container mat-text-on-error-container"
    style="border-color: var(--mat-sys-error)"
  >
    <div>
      <mat-icon class="small">warning</mat-icon>
    </div>

    <span class="text-sm">
      This item is currently out of stock. Add it to your wishlist to be notified when it's
      available again.
    </span>
  </div>
}
