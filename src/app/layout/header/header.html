@let vm = store.vm();

<mat-toolbar #header class="w-full px-24! py-8! gap-4 elevated z-50 fixed">
  <button matIconButton>
    <mat-icon>menu</mat-icon>
  </button>

  <a routerLink="/">
    <h1>Modern Store</h1>
  </a>

  <mat-form-field
    appearance="outline"
    subscriptSizing="dynamic"
    class="mx-auto basis-1/2 drop-shadow-md"
  >
    <mat-icon matPrefix>search</mat-icon>
    <input matInput placeholder="Search Products..." />
  </mat-form-field>

  <button
    matIconButton
    routerLink="/wishlist"
    [matBadge]="vm.wishlistCount"
    [matBadgeHidden]="vm.wishlistCount <= 0"
  >
    <mat-icon>favorite</mat-icon>
  </button>

  <button
    matIconButton
    routerLink="/cart"
    [matBadge]="vm.cartItemsCount"
    [matBadgeHidden]="vm.cartItemsCount <= 0"
  >
    <mat-icon>shopping_cart</mat-icon>
  </button>

  <button matButton="text">Sign In</button>

  <button matButton="filled">Sign Up</button>
</mat-toolbar>
