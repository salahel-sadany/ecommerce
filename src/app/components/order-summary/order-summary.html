<div class="flow" style="--flow-margin: 1.5em">
  <h2>Order Summary</h2>

  <ng-content select="[itemsSummary]" />

  <div>
    <p>
      <span>Subtotal</span>
      <span>{{ price() | currency }}</span>
    </p>

    <p>
      <span>Tax</span>
      <span>{{ 0 | currency }}</span>
    </p>
  </div>

  <div>
    <p class="total">
      <span>Total</span>
      <span>{{ price() | currency }}</span>
    </p>
  </div>

  <ng-content select="[actionButton]" />
</div>
