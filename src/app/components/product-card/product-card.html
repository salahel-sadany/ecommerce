<article
  class="mat-bg-surface rounded-xl overflow-hidden shadow-lg cursor-pointer grid grid-rows-subgrid row-span-6 gap-0 relative"
>
  <button
    matIconButton
    class="absolute! end-3 top-3 z-10 mat-bg-surface transition-all duration-200 hover:-translate-y-0.5 hover:scale-105"
    (click)="toggleWishlist()"
  >
    <ng-content select="toggle-wishlist-icon" />
  </button>

  <img
    [src]="product().imageUrl"
    [alt]="product().description"
    class="max-w-full h-80 block object-cover object-center aspect-video"
  />

  <div class="p-5 grid grid-rows-subgrid row-span-5 gap-4">
    <h3 class="text-lg font-semibold">{{ product().name }}</h3>

    <p class="text-sm leading-relaxed mat-text-on-secondary-container">
      {{ product().description }}
    </p>

    <div class="flex items-center gap-2">
      <div class="text-amber-300">
        <mat-icon>star</mat-icon>
        <mat-icon>star</mat-icon>
        <mat-icon>star</mat-icon>
        <mat-icon>star</mat-icon>
        <mat-icon>star_half</mat-icon>
      </div>

      <span class="mat-text-on-secondary-container">({{ product().reviewCount }})</span>
    </div>

    <p class="text-sm font-medium" [class]="product().inStock ? 'text-green-500' : 'text-red-500'">
      {{ product().inStock ? 'In Stock' : 'Out of Stock' }}
    </p>

    <div class="flex justify-between items-center">
      <span class="text-2xl font-bold">{{ product().price | currency }}</span>
      <button matButton="filled" class="flex gap-1.5">
        <mat-icon>shopping_cart</mat-icon>
        <p>Add to Cart</p>
      </button>
    </div>
  </div>
</article>
